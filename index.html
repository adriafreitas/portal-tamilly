<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal Místico - Abril</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'Cinzel','Playfair Display','Georgia',serif;
      background:#000;
      color:#fadb5d;
      min-height:100vh;
      position:relative;
      overflow-x:hidden
    }

    /* 🔮 FUNDO MÍSTICO (AJUSTADO, SEM QUEBRAR DESIGN) */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at 25% 30%, rgba(138,43,226,0.5), transparent 60%),
        radial-gradient(circle at 75% 70%, rgba(75,0,130,0.5), transparent 60%),
        radial-gradient(circle at 50% 50%, rgba(255,215,0,0.15), transparent 70%),
        #000;
      z-index:-2;
    }

    body::after{
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.2px 1.2px at 40% 80%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.8px 1.8px at 80% 70%, rgba(255,255,255,0.9), transparent);
      z-index:-1;
    }

    .portal{
      width:100%;
      max-width:580px;
      margin:0 auto;
      background:rgba(0,0,0,.85);
      backdrop-filter:blur(20px);
      border:2px solid rgba(250,219,93,.4);
      border-radius:28px;
      padding:40px;
      box-shadow:0 28px 56px rgba(0,0,0,.9),inset 0 1px 0 rgba(250,219,93,.2),0 0 80px rgba(138,43,226,.3);
      position:relative;
      overflow:hidden
    }

    .portal::before{
      content:"✦ 🃏 ✦";
      position:absolute;
      top:20px;
      left:50%;
      transform:translateX(-50%);
      font-size:24px;
      color:rgba(250,219,93,.7);
      letter-spacing:12px;
      animation:float 8s ease-in-out infinite
    }

    @keyframes float{
      0%,100%{transform:translateX(-50%) translateY(0px)}
      50%{transform:translateX(-50%) translateY(-8px)}
    }

    h1{
      font-size:clamp(28px,6vw,42px);
      text-align:center;
      margin-bottom:20px;
      background:linear-gradient(45deg,#fadb5d,#ffed4e,#fadb5d);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 4px 16px rgba(250,219,93,.8);
      letter-spacing:2px
    }

    .subtitle{
      font-size:clamp(16px,3.5vw,22px);
      text-align:center;
      margin-bottom:40px;
      color:#e6d4a8;
    }

    .astros{
      position:absolute;
      top:12px;
      right:20px;
      font-size:20px;
      opacity:.7
    }

    .semana{
      display:block;
      width:100%;
      margin-bottom:28px;
      padding:28px 24px;
      background:linear-gradient(135deg,rgba(138,43,226,.25),rgba(75,0,130,.2));
      border:2px solid rgba(250,219,93,.3);
      border-radius:24px;
      text-decoration:none;
      color:#fadb5d;
      transition:all .4s;
      text-align:center;
      position:relative;
      box-shadow:0 8px 24px rgba(138,43,226,.3)
    }

    .semana:hover{
      transform:translateY(-8px) scale(1.03);
      border-color:rgba(250,219,93,.6);
      box-shadow:0 20px 48px rgba(138,43,226,.5)
    }

    .semana-num{
      font-size:clamp(22px,4.8vw,30px);
      font-weight:700;
      display:block;
      margin-bottom:12px;
    }

    .semana-data{
      font-size:clamp(15px,3.2vw,20px);
      opacity:.9;
    }

    /* PLAYER ORIGINAL RESTAURADO */
    .player{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.97);
      backdrop-filter:blur(16px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:48px
    }

    .player.active{display:flex}

    .player-card{
      width:100%;
      max-width:520px;
      background:rgba(0,0,0,.9);
      backdrop-filter:blur(30px);
      border:2px solid rgba(250,219,93,.5);
      border-radius:32px;
      padding:48px;
      text-align:center;
      box-shadow:0 40px 80px rgba(0,0,0,.95),0 0 100px rgba(138,43,226,.4)
    }

    .player-close{
      position:absolute;
      top:28px;
      right:28px;
      background:rgba(138,43,226,.3);
      border:2px solid rgba(250,219,93,.4);
      border-radius:50%;
      width:56px;
      height:56px;
      color:#fadb5d;
      font-size:28px;
      cursor:pointer;
    }

    audio{
      width:100%;
      margin:32px 0;
    }

    @media(max-width:480px){
      .portal{padding:32px}
      .player{padding:32px}
    }
  </style>
</head>

<body>

  <div class="portal">
    <div class="astros">🪐✨🪐</div>

    <h1>Portal Místico - Abril</h1>
    <p class="subtitle">Toda segunda-feira seus áudios semanais são liberados.<br>Sua leitura em áudio: voz Adria Freitas</p>

    <a href="#" data-audio="https://https://www.dropbox.com/scl/fi/202vt6dhc93fcil67nczd/tamilly.mp3?rlkey=dthxmudfnm3l44t96qom46l24&st=7cpqi3ix&dl=1" class="semana">
      <span class="semana-num">1ª SEMANA</span>
      <span class="semana-data">30/03 a 06/04</span>
    </a>

    <a href="#" data-audio="LINK_SEMANA2.mp3" class="semana">
      <span class="semana-num">2ª SEMANA</span>
      <span class="semana-data">06/04 a 13/04</span>
    </a>

    <a href="#" data-audio="LINK_SEMANA3.mp3" class="semana">
      <span class="semana-num">3ª SEMANA</span>
      <span class="semana-data">13/04 a 20/04</span>
    </a>

    <a href="#" data-audio="LINK_SEMANA4.mp3" class="semana">
      <span class="semana-num">4ª SEMANA</span>
      <span class="semana-data">20/04 a 27/04</span>
    </a>
  </div>

  <div class="player" id="player">
    <button class="player-close" onclick="closePlayer()">×</button>

    <div class="player-card">
      <div id="playerWeek"></div>
      <audio id="audioPlayer" controls></audio>
    </div>
  </div>

<script>
const semanas = document.querySelectorAll('.semana');
const player = document.getElementById('player');
const audio = document.getElementById('audioPlayer');
const playerWeek = document.getElementById('playerWeek');

semanas.forEach(semana => {
  semana.addEventListener('click', (e) => {
    e.preventDefault();

    const audioSrc = semana.getAttribute('data-audio');

    if(audioSrc && !audioSrc.includes('LINK_')){
      audio.src = audioSrc;
      playerWeek.textContent = semana.innerText;
      player.classList.add('active');
      audio.load();
      audio.play().catch(()=>{});
    }
  });
});

function closePlayer(){
  player.classList.remove('active');
  audio.pause();
  audio.currentTime = 0;
}

player.addEventListener('click', (e)=>{
  if(e.target === player) closePlayer();
});
</script>

</body>
</html>
